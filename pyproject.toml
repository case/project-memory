[tool.ruff]
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear (likely bugs)
    "UP",  # pyupgrade (modernize syntax for target-version)
    "SIM", # flake8-simplify
]
# E501 (line-too-long) is handled by `ruff format`; double-enforcing in the
# linter produces noise on intentional long strings the formatter left alone.
ignore = ["E501"]
